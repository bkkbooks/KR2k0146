body:
  text: 職方外紀卷一眀艾儒略撰亞細亞總説亞細亞者天下一大州也人類肇生之地聖賢首出之鄉其地西起那多理亞離福島六十二度東至亞尼俺峽離一百八十度南起爪音撾哇在赤道南十二度北至冰海在赤道北七十二度所容國土不啻百餘其大者首推中國此外曰韃而靼曰回回曰印弟亞曰莫卧爾曰百兒西亞曰度兒格曰如德亞並此州巨邦也海中有巨島曰則意蘭曰蘇門答刺曰爪哇曰渤泥曰吕宋曰馬路古更有地中海諸島亦屬此州界內中國則居其東南自古帝王立極聖哲遞興聲名文物禮樂衣冠之美與夫山川土俗物産人民之富庶逺近所共宗仰其北極出地之度南起瓊州出地一十八度北至開平等處出地四十二度從南涉北共得二十四度徑六千里東西大抵略同其距大西洋路幾九萬開闢未始相通但海外傳聞尊稱之為大知納近百年以來西舶往來貿遷始闢其途而又耶穌會中諸士幸復遍歷觀光益習中華風土今欲揄揚萬一則一統志諸書舊已詳盡至中華朝貢屬國如韃韃西番女直朝鮮琉球安南暹羅真臘之類俱悉一統志中亦不復贅故略撮職方之所未載者於左韃而靼中國之北迤西一帶直抵歐邏巴東界俱名韃而靼其地江河絶少平土多沙大半皆山大者曰意貌中分亞細亞之南北其北皆韃而靼種也氣候極寒冬月無雨入夏微零僅濕土而已人性好勇以病殁為辱人罕得遍歷其地亦無文字相通故未悉其詳然大率少城郭居室駕屋於車以便遷徙産牛羊駱駝嗜馬肉以馬頭為絶品貴者方得噉之道行飢渴即刺所乘馬瀝血而飲復嗜酒以一醉為榮國俗大都如此更有殊異不倫如夜行晝伏身蒙鹿皮懸尸於樹喜食蛇蟻蜘蛛者有人身羊足氣候寒極夏月層冰二尺者有長人善躍一躍三丈履水如行陸者有人死不葬以鐵索挂尸於樹者有父母將老即殺食之以為念親之恩必葬於腹而不忍委之邱隴者此皆韃而靼東北諸種也迤西舊有女國曰亞瑪作搦最驍勇善戰嘗破一名都曰厄弗俗即其地建一神祠宏麗奇巧殆非思議所及西國稱天下有七奇此居其一國俗惟春月容男子一至其地生子男輒殺之今亦為他國所併存其名耳又有地曰得白得不以金銀為幣止用珊瑚至大剛國惟屑樹皮為餅如錢印王號其上以當幣其俗國主死後輿棺往葬道逢人輒殺之謬謂死者可事其主也嘗有一王會葬殺人以萬計者此皆韃而靼西北諸種也回回中國之西北出嘉峪關過哈密土魯番曰加斯加爾多髙山産玉石二種出水中者極美出山石中者以薪火燒石迸裂乃鑿取之甚費工力牛羊馬畜極多因不啖豕諸國無豕自此以西曰撒馬兒罕曰革利哈大藥曰加非爾斯當曰杜爾格斯當曰查理曰加木爾曰古查曰蒲加刺得皆回回諸國也其人多習武若商旅防寇非聚數百不可行亦有好學好禮者初宗馬哈默之教諸國多同後各立門户互相排擊持戒亦有數端其大者在不得辨論教中事謂教如此立則當冥心順受雖理有未安弗顧也印弟亞中國之西南曰印弟亞即天竺五印度也在印度河左右國人面皆紫色其南土曉天文頗識性學亦善百工技巧無筆札以錐畫樹葉為書國王之統例不世及以姊妹之子為嗣親子弟給祿自膳男子不衣衣僅以尺布掩臍下女人有以布纒首至足者其俗士農工賈各世其業最貴者曰婆羅門次曰乃勒大抵奉佛多設齋醮今沿海諸國與西客往來者亦率奉天主正教其地有加得山中分南北南半則山川氣候鳥獸蟲魚草木之屬無不各極詭異其地自立夏以至秋分無日不雨反是則片雲不合酷暑難堪惟日有涼風解之其風自己至申從海西來自亥至寅從陸東來草木異於常者不可屈指西友鄧儒望嘗遊其國獲覩草木生平未嘗見者至五百餘種其所産木以造舟極堅永不破壞多産椰樹為天下第一良材幹可造舟車葉可覆屋實能療飢漿能止渴又可為酒為醋為油為飴糖堅處可削為釘殼可盛飲食瓤可索綯種一木而一室之利畢賴之矣又有二奇木其一名陰樹花形如茉莉旦晝不開至夜始放向晨盡落地矣國人好卧於樹下至蚤花覆滿身其一木不花而實人不可食其枝飄揚下垂附地便生根若柱如是嵗久結成巨林國人蔭其下無異屋宇至有容千人者其樹之中近原幹處則以供佛名菩薩樹鳥類最多有巨鳥吻能解百毒國中甚貴之一吻直金錢五十地産象異於他種能識人言土人或命負物至某地往輒不爽他國象遇之則蹲伏有獸名獨角天下最少亦最奇利未亞亦有之額間一角極能解毒此地恆有毒蛇蛇飲泉水水染其毒人獸飲之必死百獸在水次雖渴不敢飲必俟此獸來以角攪其水毒遂解百獸始就飲焉勿搦祭亞國庫云有兩角稱為國寶又有獸形如牛身大如象而少低有兩角一在鼻上一在頂背間全身皮甲甚堅鋭箭不能入其甲交接處比次如鎧甲甲面犖確如鯊皮頭大尾短居水中可數十日從小豢之亦可馭百獸俱懾伏尤憎象與馬偶值必逐殺之其骨肉皮角牙蹄糞皆藥也西洋俱貴重之名為罷達或中國所謂麒麟天祿辟邪之類其貓有肉翅能飛蝙蝠大如貓蛇種類極多大半俱毒地勢為三角形末鋭處濶不百步東西氣候無不各極相反此晴則彼雨此寒則彼熱此風濤蔽天則彼穩如平地矣故海舶有乘順風而過者至鋭處則行如拔山此南印度之尤異也莫卧爾印度有五惟南印度尚仍其舊餘四印度皆為莫卧爾併矣莫卧爾之國甚廣分為十四道象至三千餘隻近百年內吞併鄰國甚多嘗攻西印度其西印度王統兵五十萬馬十五萬象二百每象負一木臺容人可二十又載銃千門其大者四門每門駕牛二百又盛載金銀滿五十巨罌以禦之不勝盡為莫臥爾王所獲又東印度有大河名安日國人謂經此水一浴所作罪業悉得消除五印度之人咸往沐浴冀得滅罪生天也其東近滿刺加處國人各奉四元行之一死後各用本行葬其尸如奉土者入土奉水火者投水火至奉氣者則懸挂尸於空中亦大異也百爾西亞印度河之西有大國曰百爾西亞太古生民之始人類聚居言語惟一自洪水之後機智漸生人心好異即其地創一髙臺欲上窮天際天主憎其長傲遂亂諸人之語音為七十二種各因其語散厥五方至今其址尚在名曰罷百爾譯言亂也謂亂天下之言也百爾西亞之初為罷鼻落你亞幅􅊷甚廣都城百二十門乘馬疾馳一日未能周也國中有一苑囿造於空際下以石柱擎之上承土石凡樓臺池沼草木鳥獸之屬無不畢具大復踰於一邑天下七奇此亦一也後其國為百爾西亞所併遂稱今名至今強大國主嘗建一臺純以所殺回回頭纍之臺成髑髏幾五萬草年前其國主好獵一圍獲鹿至三萬欲侈其事亦聚其角為臺今尚存也又東近撒馬兒罕界一塔皆以黃金鑄成上頂一金剛石如胡桃光夜照十五里其地江河極大有一河發水水所及處即生各種名花南有島曰忽魯謨斯在赤道北二十七度其地悉是鹽否則硫黃之屬草木不生鳥獸絶迹人著皮履遇雨過履底一日輒敗多地震氣候極熱人須坐卧水中沒至口方解又絶無淡水勺水亦從海外載至其艱如此因其地居三大州之中凡亞細亞歐邏巴利未亞之富商大賈多聚此地百貨駢集人煙輻輳凡海內極珍奇難致之物往輒取之如寄土人嘗言天下若一戒指此地則戒指中之寶物也度爾格百爾西亞西北諸國皆為度爾格所併內有國曰亞刺比亞中有大山名西乃上古之世天主垂訓下民召一聖人美瑟於此山賜以十誡著於石版左板三戒右板七戒今所傳十誡是也土産金銀極精亦多寶石地在二海之中氣候常和一嵗再熟有樹如橡栗夜露墜其上即凝為蜜晨取食之極甘美更産百物俱豐自古稱為福土其地有沙海廣二千餘里沙乘大風如浪行旅過之偶為沙浪所壓倐忽上成邱山凡欲渡者須以羅經定方向測道理又須備糧糗及兼旬之水乘以駱駝駝行甚疾可日馳四五百里又耐渴一飲可度五六日其腹容水甚多客或乏水則剖駝飲其腹中水傳聞有鳥名弗尼思其夀四五百嵗自覺將終則聚乾香木一堆立其上待天甚熱搖尾燃火自焚矣骨肉遺灰變成一蟲蟲又變為鳥故天下止有一鳥而已西國言人物奇異無兩者皆謂之弗尼思云其西北舊有瑣奪馬古極富厚名於西土因恣男色之罪天主降之重罰命天神下界止導一聖德士名落得者及其家人出疆遂降火盡焚其國至今小石遇火即燃臭惡不可近産一果如橘柚形色鮮妍可玩破之則臭煙而已其地有一海長四百里廣百里水味極鹹性凝結不生波浪嘗湧大塊如松脂不能沉物雖用力按抑不能入曾有國王異之往觀命人沉水試之終不可入海色一日屢變日光炫耀文成五色因其不生水族故命曰死海度兒格之西北曰那多理亞國有山多瓊石國人嘗往鑿之至一石穴見石人無算皆昔時避亂之民穴居於此死後為寒氣所凝漸化為石其地西界歐邏巴處中隔一海寬五里許昔有一名王曰失爾塞者造一跨海石梁通連兩地今為風浪衝擊亦崩頽矣又有地名際刺産異羊羊之絨輕細無比雨中衣之略不沾濡即漬以油毫不汚染也一種異犬性好竊衣履巾帨之屬稍不慎輒為竊匿矣有山生草木皆香過之則香氣馥郁襲人衣裾如德亞古名拂菻又名大秦唐貞觀中曾以經像來賔有景教流行碑刻可考亞細亞之西近地中海有名邦曰如德亞此天主開闢以後肇生人類之邦天下諸國載籍上古事迹近者千年逺者三四千年而上多茫昧不明或異同無據惟如德亞史書自初生人類至今將六千年世代相傳及分散時候萬事萬物造作原始悉記無訛諸邦推為宗國地甚豐厚人煙稠密是天主生人最初賜此沃壤其國初有大聖人曰亞把刺杭約當中國虞舜時有孫十二人支族繁衍天主分為十二區厥後生育聖賢世代不絶故其人民百千年間皆純一敬事天主不為異端所惑其國王多有聖德乃天主之所簡命也至春秋時有二聖王父曰大味得子曰撒刺滿嘗造一天主大殿皆金玉砌成飾以珍寶窮極美麗其費以三十萬萬其王德絶盛智絶髙聲聞最逺中國所傳謂西方聖人疑即指此也此地從來聖賢多有受命天主能前知未來事者國王有疑事必從決之其聖賢竭誠祈禱以得天主默啓其所前知悉載經典後來無不符合經典中第一大事是天主降生救拔人罪開萬世升天之路預説甚詳後果降生於如德亞白德稜之地名曰耶穌譯言救世主也在世三十三年教化世人所顯神靈聖迹甚大且多如命瞽者眀聾者聽喑者言跛者行病者起以至死者生之類不可殫述有宗徒十二人皆耶穌縱天之能不假學力即通各國語言文字其後耶穌肉身升天諸弟子分散萬國闡明經典宣揚教化各著神奇事迹亦能令病者即愈死者復生又能驅逐邪魔緣此時天下萬國大率為邪魔誘惑不遵天主正教妄立邪主各相崇奉其所奉像又諸國不同不止千萬自天主降生垂教乃始曉悟真理絶其向所崇信惡教而敬信崇向於一天主焉所化國土如德亞諸國為最先延及歐邏巴利未亞大小千餘國歷今千六百餘年來其國皆久安長治其人皆忠孝貞廉男女為聖為賢不可勝數兹為略述教中要義數端一曰天地間至尊至大為人物之真主大父者止有其一不得有二一者即天主上帝而已其全智全能全善浩無窮際萬神人物皆為天主所造又恆賴其保持安養凡人禍福修短皆其主宰故吾人所當敬畏愛慕者獨有一天主也此外或神或人但能教人純一以事天主即為善人吉神若以他道誘人求福免禍是僣居天主之位而眀奪其權也其為凶神惡人無疑崇信祭祀此類者不免獲罪一曰天地間惟一天主為真主故其聖教獨為真教從之則令人行真善而絶不為惡可升天堂永脫地獄若他教乃是人所建立斷未有能行真善免罪戾而升天堂脫地獄者一曰人有形軀有靈魂形軀可滅靈魂不可滅人在世時可以行善可以去惡一至命終人品已定永不轉移天主於時乃審判而賞罰之其人純一敬事天主及愛人如已必升天參配天神及諸聖賢受無窮真福若不愛信天主違犯教戒者必墮地獄永受苦難也其苦樂永永無改更無業盡復生為人及輪回異類等事故實欲升天堂脫地獄只在生前實能為善去惡無他法也一曰人犯一切大小過惡皆得罪於天主者也故惟天主能赦宥之非神與人所能赦亦非徒誦念徒施舍所能贖也今人生孰能無過欲求赦宥必須深悔前非勇猛遷改故初入教先悔罪有拔地斯摩之禮既重犯求解罪有恭棐桑之禮遵依聖教守戒祈求必獲赦宥不然一生罪過無法可去地獄無法可脫也所以教中要義望人真能改過遷善以獲赦免而享升天真福自有専書備論云如德亞之西有國名達馬斯谷産絲綿絨罽刀劍顏料極佳城有二層不用磚石是一活樹糾結無隙甚厚而髙峻不可攀登天下所未有也土人製一藥甚良名的里亞加能治百病尤解諸毒有試之者先覓一毒蛇咬傷毒發腫脹乃以藥少許咽之無弗愈者各國甚珍異之則意蘭以下皆海島印弟亞之南有島曰則意蘭離赤道北四度人自幼以環擊耳漸垂至肩而止海中多珍珠江河生貓晴昔泥紅金剛石等山林多桂皮香木亦産水晶嘗琢成棺以斂死者相傳為中國人所居今房屋殿宇亦頗相類西有小島總名馬兒地襪不下數千悉為人所居海中生一椰樹其實甚小可療諸病蘇門答刺一名須文達那蘇門答刺地度十餘度跨於赤道之中至濕熱他國人至者多病君長不一其地産金甚多向稱金島亦産銅鐵錫及諸色染料有大山有油泉可取為油多沉香龍腦金銀香椒桂人強健習武恆與敵國相攻殺多海獸海魚時登岸傷人其東北滿剌加國地不甚廣而為海商輻輳之地正居赤道下春秋二分正當於人頂氣候極熱賴無日不雨故人可居之産象及胡椒多佳果木終嵗不絶人良善不事生業或彈琵琶間遊而已瓜哇瓜哇大小有二俱在蘇門答刺東南離赤道南十度海島各自有主多象無馬騾僅産香料蘇木象牙之屬不用錢以胡椒及布為貨幣人姦宄凶急好作魘魅妖術諸國每爭白象即治兵相攻擊急白象者白象所在即為盟主也渤泥渤泥島在赤道下出片腦極佳以燃火沉水中火不滅直焚至盡有獸似羊似鹿名把雜爾其腹中生一石能療百病西客極貴重之可至百換國王籍以為利吕宋廣州之東南為吕宋其地産一鷹有鷹王飛則衆鷹從之或得禽獸俟鷹王先取其睛然後羣鷹方啖其肉又有一樹百獸不得近之一過其下即斃矣馬路古吕宋之南有馬路古無五榖出沙谷米是一木磨粉而成産丁香胡椒二樹天下絶無惟本處折枝插地即活性最熱袪濕氣與水酒同貯旋即汲乾樹傍不生他草土人欲除草萊惟折其枝插地草立稿矣又産異羊牝牡皆有乳有大龜一殼可容一人或用為盾以禦敵地中海諸島亞細亞之地中海有島百千其大者一曰哥阿島曩國人盡患疫內有名醫名依卜加得不以藥石療之令城內外遍舉大火燒一晝夜火息而病亦愈矣蓋疫為邪氣所侵火氣猛烈能蕩滌諸邪邪盡而疾愈亦至理也一曰羅得島天氣常清明終嵗見日無竟日陰霾者其海畔嘗鑄一巨銅人髙踰浮屠海中築兩臺以盛其足風帆直過跨下其一指中可容一人直立掌托銅盤夜燃火於內以照行海者鑄十二年而成後為地震而崩國人運其銅以駱駝九百隻往負之一曰際波里島物産極豐每嵗國賦至百萬葡萄酒極美可度八十年又出火浣布是煉石而成非他物也地熱少雨嘗連晴三十六年土人散往他國今稍稍湊集矣職方外紀卷一
