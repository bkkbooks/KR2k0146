body:
  text: 職方外紀卷二眀艾儒略撰歐邏巴總説天下第二大州名曰歐邏巴其地南起地中海北極出地三十五度北至冰海出地八十餘度南北相距四十五度徑一萬一千二百五十里西起西海福島初度東至阿比河九十二度徑二萬三千里共七十餘國其大者曰以西把尼亞曰拂郎察曰意大里亞曰亞勒馬尼亞曰法蘭得斯曰波羅尼亞曰翁加里亞曰大尼亞曰雲除亞曰諾勿惹亞曰厄勒祭亞曰莫斯哥未亞其地中海則有甘的亞諸島西海則有意而蘭大諳厄利亞諸島云凡歐邏巴州內大小諸國自國王以及庶民皆奉天主耶穌正教纖毫異學不容竄入國主互為婚姻世相和好財用百物有無相通不私封殖其婚娶男子大約三十女子至二十外臨時議婚不預聘通國之中皆一夫一婦無敢有二色者土多肥饒産五榖來麥為重果實更繁出五金以金銀銅鑄錢為幣衣服蠶絲者有天鵝絨織金段之屬羊絨者有毯罽鎖哈剌之屬又有苧麻之類名利諾者為布絶細而堅輕而滑大勝棉布敝則可搗為紙極堅韌今西洋紙率此物君臣冠服各有差等相見以免冠為禮男子二十已上概衣青色兵士勿論女人以金寶為飾服御羅綺佩帶諸香至四十及未四十而寡者即屏去衣素衣酒悉以葡萄釀成不雜他物其酒可積至數十年當生子之年釀酒至兒年三十娶婦時用之酒味愈美諸種不同無葡萄處或用牟麥釀之其膏油之類味美而用多者曰阿利襪是樹頭之果熟後即全為油其生最繁又易長平地山岡皆可栽種國人以法制之最饒風味食之齒頰生津在橄欖馬金囊之上其核又可為炭滓可為鹻葉可食牛羊凡國人所稱資産蓄大小麥第一葡萄酒次之阿利襪油又次之蓄牛羊者為下其國俗雖多酒但會客不以勸飲為禮偶犯醉者終身以為詬辱飲食用金銀玻璃及磁器天下萬國坐皆席地惟中國及歐邏巴諸國知用椅卓其屋有三等最上者純以石砌其次磚為墻柱木為棟梁其下土為墻木為梁柱石屋磚屋築基最深可上纍六七層髙至十餘丈地中亦有一層既可窖藏亦可除濕瓦或用鉛或輕石板或陶瓦凡磚石屋皆歷千年不壞墻厚而實外氣難通冬不寒而夏不溽其工作如木工石工畫工塑工繡工之類皆頗知度數之學製造備極精巧凡為國工者皆考選用之其駕車國王用八馬大臣六馬其次四馬或二馬乘載騾馬驢互用戰馬皆用牡騸過則弱不堪戰矣又良馬止飼大麥及稈不雜他草及豆食豆者足重不可行此歐邏巴飲食衣服宫室制度之大略也歐邏巴諸國皆尚文學國王廣設學校一國一郡有大學中學一邑一鄉有小學小學選學行之士為師中學大學又選學行最優之士為師生徒多者至數萬人其小學曰文科有四種一古賢名訓一各國史書一各種詩文一文章議論學者自七八嵗學至十七八學成而本學之師儒試之優者進於中學曰理科有三家初年學落日加譯言辨是非之法二年學費西加譯言察性理之道三年學默達費西加譯言察性理以上之學總名斐録所費亞學成而本學師儒又試之優者進於大學乃分為四科而聽人自擇一曰醫科主療病疾一曰治科主習政事一曰教科主守教法一曰道科主興教化皆學數年而後成學成而師儒又嚴考閲之凡試士之法師儒羣集於上生徒北面於下一師問難畢又輪一師果能對答如流然後取中其試一日止一二人一人遍應諸師之問如是取中便許任事學道者専務化民不與國事治民者秩滿後國王遣官察其政績詳訪於民間凡所為聽理詞訟勸課農桑興革利弊育養人民之類皆審其功罪之實以告於王而黜陟之凡四科官祿入皆厚養廉有餘尚能推惠貧乏絶無交賄行賂等情其諸所讀書籍皆聖賢撰著從古相傳而一以天主經典為宗即後賢有作亦必合於大道有益人心乃許流傳國內亦専設檢書官看詳羣書經詳定訖方準書肆刋行故書院積書至數十萬卷毋容一字蠱惑人心敗壞風俗者其都會大地皆有官設書院聚書於中日開門二次聽士子入內抄寫誦讀但不許擕出也又四科大學之外有度數之學曰瑪得瑪第加亦屬斐録所科內此専究物形之度與數度其完者以為幾何大數其截者以為幾何多二者或脫物而空論之則數者立算法家度者立量法家或體物而偕論之則數者在音相濟為和立律吕家度者在天迭運為時立歷法家此學亦設學立師但不以取士耳此歐邏巴建學設官之大略也歐邏巴國人奉天主正教在遵持兩端其一愛敬天主萬物之上其一愛人如已愛敬天主者心堅信望仁三德而身則勤行瞻禮工夫其瞻禮殿堂自國都以至鄉井隨在建立復有掌教者専主教事人皆稱為神父俱守童身屏俗緣純全一心敬事天主化誘世人其殿堂一切供億皆國王大臣民庶轉輸不絶國人羣往歸焉每七日則行公共瞻禮名曰彌撒此日百工悉罷通國上下往焉聽掌教者講論經典勸善戒惡女婦則另居一處而聽男女有别其愛人如已一是愛其靈魂使之為善去惡盡享生天之福二是愛其形軀如我不慈人天主亦不慈我故歐邏巴人俱喜施捨千餘年來未有因貧鬻子女者未有飢餓轉溝壑者在處皆有貧院専養一方鰥寡孤獨處其中者又各有業雖殘疾之人亦不廢如瞽者運手足痺者運耳目各有攸當務使曲盡其才而不為天壤之廢物又有幼院専育小兒為貧者生兒舉之無力殺之有罪故特設此院令人撫育以全兒命其族貴而家貧者恥於送子入院更有兩全之法其院穴墻以設轉盤內外隔絶不相見送兒者乘人不見置兒盤中扣墻則院中人轉兒入矣其曾領洗與否皆明記兒胸異時父母復欲收養則按所入之年月便得其子又有病院大城多至數十所有中下院處中下人有大人院處貴人凡貴人若羈旅若使客偶患疾病則入此院院倍美於常屋所需藥物悉有主者掌之預備名醫日與病者診視復有衣衾帷幔之屬調護看守之人病愈而去貧者量給資斧此乃國王大家所立或城中人併力而成月輪一大貴人總領其事凡藥物飲食皆親自驗視之各城邑遇豐年多積米麥飢嵗以常價糶之如所謂常平倉者人遇道中遺物或獸畜之類必覓其主還之弗得主則養之國中每年數日定一公所認識遺畜失者與得者偕來會集如遇原主則聽其領去如終弗得主則或宰肉或賣價以散貧人若拾金銀寶物則書於天主堂門外令人來識先令預言其狀如一一符合即以還之不得主亦散於貧乏國中又有天理堂選盛德宏才無求於世者主之凡國家有大舉動大征伐必先質之此堂問合天理與否擬以為可然後行之國人病危悔過祈赦則分析産業遺一分為仁用或以救貧乏或以助病院或以贖敵國所虜或以修飾天主殿庭一切仁事悉從病人之意遺於子孫謂子孫之財遺於仁用謂已靈魂之財其聖教中人更有慕道最深拋棄世間福樂或避居於山谷或入聖人聖女所立之會而畢世修持者其入會須發三誓一守貞以絶色一安貧以絶財一從命以絶意凡歐邏巴諸國從十六七嵗願入會中矢守童身者自國王大臣宗室以下男女不可勝紀其女子入會後惟父母至戚得往見之餘絶不相交接其會中居室原極宏敞亦自不礙遊息也其男子入會例有多端有専自修不務化人者有務化人不能逺遊者又有化人而欲及天下者此則離本國捐朋友棄親戚遍歷遐方其視天下猶一家視天下人猶一體不辭險阻艱辛雖啖人炙人之地亦身歷焉惟祈普天之下皆識真主而救其靈魂升天以畢素志此歐邏巴敬天愛人之大略也歐邏巴諸國賦稅不過十分之一民皆自輸無徴比催科之法詞訟極簡小事里中有德者自與和解大事乃聞官府官府聽斷不以己意裁決所憑法律條例皆從前格物窮理之王所立至詳至當官府必設三堂詞訟大者先訴第三堂不服告之第二堂又不服告之第一堂終不服則上之國堂經此堂判後人無不聽於理矣訟獄皆據實誣告則告者與證見即以所告之罪坐之若告者與訴者指言證見是仇或生平無行或嘗經酒醉即不聽為證者凡官府判事除實犯真贓外亦不先事加刑必俟事明罪定招認允服然後刑之官亦始終不加罵詈即詞色略有偏向訟者亦得執言不服改就他官聽斷焉吏胥餼廪雖亦出於詞訟但因事大小以為多寡立有定例刋布署前不能多取故官府無恃勢剝奪吏胥無舞文詐害此歐邏巴刑政之大略也封內雖無戰鬬其有邪教異國恃強侵侮不可德馴如韃而靼度爾格等者本國除常設兵政外又有世族英賢智勇兼備者嘗以數千人結為義會大扺一可當十皆以保國護民為志其初入會者試果不憚諸艱方始聽入焉會在地中海馬兒達島長者王之遇警則鳩集成師而必能滅寇成功他國亦有别會俱倣佛乎此即國王亦有與其會者此又歐邏巴武備之大略也以西把尼亞歐邏巴之極西曰以西把尼亞南起三十五度北至四十度東起七度西至十八度周一萬二千五百里疆域遍跨他國世稱天下萬國相連一處者中國為冠若分散於他域者以西把尼亞為冠以西把尼亞本地三面環海一面臨山山曰北勒搦何産駿馬五金絲綿細絨白糖之屬國人極好學有共學在撒辣蔓加與亞而加辣二所逺近學者聚焉髙人輩出著作甚富而陡祿日亞與天文之學尤精古一名賢曰多斯達篤者居俾斯玻之位著書最多夀僅五旬有二所著書籍就始生至卒計之每一日當得三十六章每章二千餘言盡屬奧理後人繪彼像兩手各持一筆章其勤敏也又有一王名亞豐肅者好天文歷法精研諸天之運列宿之躔撰成歷學全書世傳嵗差本原皆其考定製為一定圖象為今歷家大用又將國典分門定類為七大部法紀極備復取天主古今經籍有注疏者不下千餘卷遍閲至十有四次又纂本國自古史書夫既身親國政又傍及著述種種如此後世稱曰賢者之王宜矣此國人自古虔奉天主聖教最忍耐又剛果且善逺遊海上曾有繞大地一周者國中有二大名城一曰西未利亞近地中海為亞墨利加諸舶所聚金銀如土竒物無數又多阿利襪果有一林長五百里者一名多勒多城在山之巔取山下之水以供山上其運水甚艱近百年內有巧者製一水器能盤水直至山城而絶不賴人力其器晝夜自能轉動也又有渾天象其大如屋人可以身入於其中見各重天之運動其度數皆與天合相傳製此象者注想十七年造作三年曾未重作一輪其境內有河曰寡第亞納伏流地中百餘里穹窿若橋梁其上為牧場畜牛羊無算有塞惡未亞城乏甘泉遙從逺山遞水架一石梁梁上作水道擎以石柱綿亘數十里又一都城悉皆火石砌成故本國有言以西把尼亞有三奇有一橋萬羊牧其上有一橋水流其上有一城以火為城池也國中奉天主之堂雖多而最著者有三一以奉雅歌默聖人為十二宗徒之一首傳聖教於此國國人尊為大師大保主四方萬國之人多至此瞻禮一在多勒多城創建極美中有金寶祭器不下數千有一精巧銀殿髙丈餘濶丈許內有一小金殿髙數尺其工費又皆多於本殿金銀之數其黃金乃國人初通海外亞墨利加所擕來者貢之於王王用以貢天主耶穌者近來國主又造一瞻禮大堂髙大奇巧無比修道之士環居焉其內可容三國之王水泉四十餘處堂前有古王像六位每位髙一丈八尺乃黑白玉琢成者堂內有三十六祭臺中臺左右有編簫二座中各有三十二層每層百管管各一音合三千餘管凡風雨波濤嘔吟戰鬬與夫百鳥之聲皆可模倣真奇物也又有書堂濶三十步長一百八十五步周列諸國經典書籍種種皆備即海外額勒濟亞國之古書亦以海舶載來貯於此處其地原繫曠野山林後因造此堂鳩工住集七年遂成一城云以西把尼亞屬國大者二十餘中下共百餘其在最西者曰波爾杜瓦爾分為五道向有本王後因乏嗣以西把尼亞之君擊其昆仲乃權署其國事焉其境內大河曰得若經都城里西波亞入海故四方商舶皆聚都城為歐邏巴總會之地也土産果實絲綿極美水族亦繁所出土産葡萄酒最佳即過海至中國毫不損壞國中共學二所曰厄物辣曰哥應拔其講學名賢曾經國王所聘雖已輟講亦終身給祿不絶歐邏巴髙士多出此學近有耶穌會士蘇氏著陡祿日亞書最精最廣超數百年名賢之上其德更邁於文國都又有一地界兩河間周圍僅七百里而髙士聚會修道之所有一百三十處又有天主堂一千四百八十所水泉二萬五千大方石橋二百通海大市六處由此可見其地之豐厚也侯家苑囿有周數十里者各種禽獸充牣其中異國名王過其地者往射獵焉隨處立有仁會遍恤孤寡煢獨或給衣食或助資賄或保護其家或葬死者商舶至或有死而無主者則為收其行李訪其親戚還之種種仁事他國雖各有會莫如此中之盛此外國王隨處遣官専撫恤孤子理其家産廣其生殖長則還所有且增益焉歐邏巴初通海道周經利未亞過大浪山扺小西洋而至中國貿遷者從此國始詳見别紀拂郎察以西把尼東北為拂郎察南起四十一度北至五十度西起十五度東至三十一度周一萬一千二百里地分十六道屬國五十餘其都城名把理斯設一共學生徒常四萬餘人併他學共有七所又設社院以教貧士一切供億皆王主之每士計費百金院居數十人共五十五處中古有一聖王名類斯者惡回回占據如德亞地初興兵伐之始制大銃因其國在歐邏巴內回回遂概稱西土人為拂郎機而銃亦沿襲此名是國之王天主特賜寵異自古迄今之主皆賜一神能以手撫人癧瘡應手而愈至今其王每嵗一日療人先期齋戒三日凡患此疾者逺在萬里之外預畢集天主殿中國王舉手撫之祝曰王者撫汝天主救汝撫百人百人愈撫千人千人愈其神異如此國王元子别有土地供其祿食不異一小王他國不爾也國土極膏腴物力豐富居民安逸有山出石藍色質脆可鋸為板當瓦覆屋國人性情溫爽禮貌周全尚文好學都中梓行書籍繁盛甚有聲聞又奉教甚篤所建瞻禮天主與講道殿堂大小不下十萬初傳教於此國者原繫如德亞國聖人辣雜琭乃當時已死四日蒙耶穌恩造命之復活即此人也意大里亞拂郎察東南為意大里亞南北度數自三十八至四十六東西度數自二十九至四十三周圍一萬五千里三面環地中海一面臨髙山名牙而白又有亞伯尼諾山橫界於中地産豐厚物力十全四逺之人輻輳於此舊有一千一百六十六郡其最大者曰羅瑪古為總王之都歐邏巴諸國皆臣服焉城周一百五十里地有大渠名曰地白里穿出城外百里以入於海四方商舶悉輸珍寶駢集此渠自古名賢多出此地曾建一大殿圜形寬大壯麗無比上為圓頂悉用磚石磚石之上復加鉛板當瓦頂之正中鑿空二丈餘以透天光顯其巧妙供奉諸神於內此殿至今二千餘年尚在也耶穌升天之後聖徒分走四方布教中有二位一伯多琭一寶祿皆至羅瑪都城講論天主事理人多信從此二聖之後又纍有盛德之士相繼闡明至於總王公斯璫丁者欽奉特虔盡改前奉邪神之宇為瞻禮諸聖人之殿而更立他殿以奉天主至今存焉教皇即居於此以代天主在世主教自伯多琭至今一千六百餘年相繼不絶教皇皆不婚娶永無世及之事但憑盛德輔弼大臣公推其一而立焉歐邏巴列國之王雖非其臣然咸致敬盡禮稱為聖父神師認為代天主教之君也凡有大事莫決必請命焉其左右嘗簡列國才全德備或即王侯至戚五六十人分領教事此羅瑪城奇觀甚多聊舉數事宰輔之家有一名苑中造流觴曲水機巧異常多有銅鑄各類禽鳥遇機一發自能鼓翼而鳴各有本類之聲西樂編簫最有巧音然亦多假人工風力成音此苑中有一編簫但置水中機動則鳴其音甚妙此外又有髙大渾全王莊外周盡鏤古來王者形像故事爛然可觀其內則空虛可容幾人登隮上下如一塔然伯多琭聖人之殿悉用精石製造花素奇巧寬大可容五六萬人殿髙處視在下之人如孩童然城中有七山其大者曰瑪山人煙最稠密第苦無泉邇來造一髙梁長六十里梁上立溝接其逺山之水如通流河也有水泉飲之其味與乳無異汲之不竭蓄之不溢近地曰羅肋多一聖殿即昔日聖母瑪利亞親身所居之室此室舊在如德亞國後為回回竊據天神凌空移至此地越海七千餘里國人欲致崇飾恐失其舊因周以玉墻覆以大殿今逢聖母誕日行旅來朝者常至數萬人儒略嘗詣此殿今已屹然巨鎮矣其西北為勿搦祭亞無國王世家共推一有功德者為主城建海中有一種木為樁入水千萬年不腐其上鋪石造室復以磚石為之備極精美城內街衢俱是海兩傍可通陸行城中有艘二萬又有一橋梁極濶上列三街俱有民居間隔了不異城市其髙又可下度風帆國中精於造舟預庀物料一舟指顧可成他方重客每至其處閲視一兩時其工已成一巨舫可以航海者矣所造玻璃極佳甲於天下有勿里諾湖在山巔從石峽瀉下聲如迅雷聞五十里飛泉噴沫成珠日光耀之恍惚皆虹霓狀有一異泉出山石中不拘何物墜於其內半月便生石皮周裹其物又有沸泉有溫泉沸泉常沸髙丈餘不可染指投畜物於內頃刻便可糜爛矣溫泉女子或浴或飲不生育者育能育者多乳所産鐵礦掘盡踰二十五年復生第在本土任加火力鐵終不鎔之他所始鎔其南為納波里地極豐厚君長極多有火山晝夜出火爆石彈射他方恆至百里外昔一名士欲窮其故近其山為火燎死後移一聖人遺蛻至本國其害遂息有一城名亞既諾聖人多瑪斯著陡録日亞者生於此地又地名哥生濟亞有兩河一河濯髮則黃濯絲則白一河濯絲髮俱黑其外有博樂業城因多公學名為學問之母昔有二大家爭為奇事一家造一方塔髙出雲表以為無復可踰一家亦建一塔與前塔齊第彼塔直聳此則斜倚若頃而今已歷數百年未壞直聳者反將頽矣又有城名把都亞中有公堂縱二百步橫六十步上為樓覆以鉛瓦而中間不立一柱又把兒瑪一堂廣可馳馬亦無一柱惟以梁如人字相倚尋丈至盈尺皆然上壓愈重則下挺持愈堅也從納波里至左里城有石山相間隔國人穴山以通道長可四五里廣可容兩車對視則如明星又有地出火四周皆小山山洞甚多入內皆可療病又各主一疾如欲得汗者入某洞則汗至欲除濕者入某洞則濕去因有百洞遂名曰一百所此皆意大里亞屬國也其大者六國俱極富庶西諺嘗曰羅瑪為聖勿搦祭亞為富彌郎為大那坡里為華熱孥亞為髙楅楞察為整各有専書備論意大里之名島有三一西齊里亞地極豐厚俗稱國之倉之庫之魂皆美其富庶也亦有大山噴火不絶百年前其火特異火燼直飛踰海達利未亞境山四周多草木積雪不消常成晶石亦有沸泉如醋物入便黑其國人最慧善談論西土稱為三舌人最精天文造日晷法自此地始有巧工德大祿者造百鳥自能飛即微如蠅蟲亦能飛更有天文師名亞而幾墨得者有三絶嘗有敵國駕數百艘臨其島國人計無所出已則鑄一巨鏡映日注射敵艘光照火發數百艘一時燒盡又其王命造一航海極大之舶舶成將下之海計雖傾一國之力用牛馬駱駝千萬莫能運舟幾墨得營運巧法第令王一舉手舟如山嶽轉動須臾下海矣又造一自動渾天儀十二重層層相間七政各有本動凡日月五星列宿運行之遲疾一一與天無二其儀以玻璃為之重重可透視真希世珍也其傍近有馬兒島不生毒物即蛇蝎等皆不螫人毒物自外至至島輒死一摋而地泥亞亦廣大生一草名摋而多泥人食之輒笑死狀雖如笑中實楚也西諺凡謂無情之笑皆名摋而多泥笑一哥而西加有三十三城所産犬能戰一犬可當一騎故其國布陳一騎間一犬反有騎不如犬者又近熱奴亞一雞島滿島皆雞自生自育不須人養又絶非野雉之屬亞勒瑪尼亞拂郎察之東北有國曰亞勒瑪尼亞南四十五度半北五十五度半西二十三東四十六度國王不世及乃其七大屬國之君所共推者或用本國之臣或用列國之君須請命教皇立之中國設共學十九所其氣候冬月極冷善造暖室微火溫之遂極暖土人散處各國以為兵極忠實可用至死不二各國護衛宫城或從征他國親兵皆選此國人充之本國人僅參其半其工作極精巧制器匪夷所思能於戒指內納一自鳴鐘地多水澤冰堅後人多於冰上用一種木屐兩足躡之一足立冰上一足從後擊之乘滑勢一激數丈其行甚速手中尚不廢常業也又有法蘭哥地人最質直易信行旅過者輒詈之容或不答則大喜延入具酒食或為計緩急未室者則妻之謂此人已經嘗試可信託也多葡萄善造酒但沽與他方過客土人滴酒不入口惟飲水而已即他國載酒至亦不容入境其屬國名博厄美亞者地生金掘井恆得金塊有重十餘斤者河底常有金如豆粒有羅得林日亞國者最侈汰西土宫室多用帷幔障壁其王有一延客堂四周皆列珊瑚琅玕交錯儼一屏障又有一大銃製作極巧二刻之間可連發四十次法蘭得斯亞勒馬尼亞之西南為法蘭得斯地不甚廣人居稠密有大城二百八十小城六千三百六十八共學三所一學分二十餘院人情俱樂易溫良最好談論善謳歌其婦女與人貿易無異男子顧其性極貞潔能手作錯金絨不煩機杼西洋布最輕細者皆出此地波羅泥亞亞勒馬尼亞東北曰波羅尼亞極豐厚地多平衍皆蜜林國人採之不盡多遺棄樹中者又産鹽及獸皮鹽透光如晶味極厚其人美秀而文和愛朴實禮賔篤備絶無盜賊人生平未知有盜國王亦不傳子聽大臣擇立賢君其王世守國法不得變動分毫亦有立其子者但須前王在位時預擬非預擬不得立即推立本國之臣或他國之君亦然國中分為四區區居三月一年而遍其地甚冷冬月海凍行旅常於冰上歷幾晝夜望星而行有屬國波多理亞地甚易發生種一嵗有三嵗之獲草菜三日內便長五六尺海濵出琥珀是海底脂膏從石隙流出初如油天熱浮海面見風始凝天寒出隙便凝每為大風衝至海濵翁加里亞翁加里亞在波羅尼亞之南物産極豐牛羊可供歐邏巴一州之用有四水甚奇其一從地中噴出即凝為石其一冬月常流至夏反合為冰其一以鐵投之便如泥再鎔又成精銅其一水色沉緑凍則便成緑石永不化矣大泥亞諸國歐邏巴西北有四大國曰大泥亞曰諾而勿惹亞曰雪際亞曰鄂底亞與亞勒馬尼亞相隔一海套道阻難通西史稱為别一天下南北經度自五十六至七十三其南夏至日長六十九刻其中長八十二刻其北夏至日輪橫行地面半年為一晝夜地多山林産獸及海魚極大異於他方其大泥亞國沿海産菽麥牛羊最多牛輸往他國者嵗常五萬海中魚蔽水面舟為魚湧輒不能行捕魚不籍網罟隨手取之不盡也近二十年內一國主名地谷白刺格酷嗜瑪得瑪第加之學嘗建一臺於髙山絶頂以窮天象究心三十餘年纍黍不爽其所制窺天之器窮極要渺後有大國王延之國中以傳其學今為西土歷法之宗其諾而勿惹亞寡五榖山林多材木鳥獸海多魚鱉人性馴厚喜接逺方賔旅曩時過客僑居者絶不索物價今稍需即饜足矣故其地絶無盜賊其雪際亞地分七道屬國十二歐邏巴之北稱第一富庶多五榖五金財貨百物貿易不以金銀即以物相扺人好勇亦善遇逺方人鄂底亞在雪際亞之南亦繁庶厄勒祭亞厄勒祭亞在歐邏巴極南地分四道經度三十四至四十三緯度四十四至五十五其聲名天下傳聞凡禮樂法度文字典籍皆為西土之宗至今古經尚循其文字所出聖賢及博物窮理者後先接踵今為回回擾亂漸不如前其人喜啖水族不嘗肉味亦嗜美酒東北有羅馬泥亞國其都城周裹三層生齒極衆城外居民綿亘二百五十里有一聖女殿門開三百六十以象周天附近有髙山名阿靈薄其山頂終嵗清明絶無風雨古時國王登山燎祀其灰至明年不動如故有河水一名亞施亞白羊飲之即變黑一名亞馬諾黑羊飲之即變白有二島一為厄歐白亞海潮一日七次昔名士亞利斯多遍窮物理惟此潮不得其故遂赴水死其諺云亞利斯多欲得此潮此潮反得亞利斯多一為哥而府圍六百里出酒與油蜜極美遍島皆橘柚香櫞之屬更無别樹天氣清和野鳥不至其地莫斯哥未亞亞細亞西北之盡境有大國曰莫斯哥東西徑萬五千里南北徑八千里中分十六道有窩兒加河最大支河八十皆以為尾閭而以七十餘口入北髙海國內兵力甚強日事吞併其地夜長晝短冬至日止二時氣極寒雪下則堅凝行旅駕車度雪中其馬疾如飛電其室宇多用火溫雪中行旅為嚴寒所侵血脈皆凍堅如冰石如驀入溫室之中耳鼻輒墮於地每自外來者先以水浸其軀俟僵體漸蘇方可入溫室內故八月以至四月皆衣皮裘多獸皮如狐貉貂鼠之屬一裘或至千金者熊皮以為卧褥永絶蟣虱産皮處即用以充賦稅以遺鄰國多至數十車國人多盜人競畜猛犬見人則噬晝置穽中夜聞鐘聲始放人亟匿影閉户矣惟國王許習文藝其餘雖貴戚大臣亦禁學恐其聰眀過主為主辱也故其國有天主能知國主能知之諺今亦稍信真教其王常手持十字國中亦傳流天主之經或聖賢傳記無禁矣俗最澆凡欲貿易須假託外邦商賈方取信國人若言本土則逆其詐矣有大鐘以搖不以撞搖非三十人不能惟國主即位及其誕日鳴之所造大銃其長三丈七尺一發用藥二石可容二人入內掃除又有一蜜林其樹悉為蜂房國人各界其樹為恆産嘗有人入蜜林見一枯樹大過合抱其人攀緣樹巔忽墮樹腹中蜜沒至口逾三四日計無所出幸有熊登樹啖蜜以掌探樹腹其人牢捉熊掌熊驚躍遂得拔出地中海諸島地中海有島百千其大者曰甘的亞曩有百城周二千三百里古王造一苑囿路徑交錯一入便不能出遊者須以物識地然後可入生一草名阿力滿少嚼便能療飢地中海風浪至冬極大難行有鳥作巢於水次一嵗一乳但自卵至翼不過半月此半月內海必平靜無風波商舶待之以渡海鳥名亞爾爵虐此半月遂名為亞爾爵虐日云西北海諸島歐邏巴西海迤北一帶至冰海海島極大者曰諳厄利亞曰意而蘭大其外小島不下千百意而蘭大經度五十三至五十八氣候極和夏熱不擇陰冬寒不需火産獸畜極多絶無毒物其國奉教之初因一王宫之婢能識認真主遂及王后國王以訖一國其地有一湖插木於內入土一假化成鐵水中一假化成石出水面方為原木也旁一小島島中一地洞常出怪異之形或云鍊罪地獄之口也諳厄利亞經度五十至六十緯度三度半至十三氣候融和地方廣大分為三道共學二所共三十院其地有怪石能阻聲其長七丈髙二丈隔石發大銃人寂不聞故名聾石有湖長百五十里廣五十里中容三十小島有三奇事一魚味甚佳而皆無鰭翅一天靜無風倐起大浪舟楫遇之無不破一有小島無根因風移動人弗敢居而草木極茂孳息牛羊豕類極多近有一地死者不殮但移其尸於山千嵗不朽子孫亦能認識地無鼠有從海舟來者至此遂死又有三湖細流相通達然其魚絶不相往來此水魚誤入彼水輒死傍有海窖潮盛時窖吸其水而永不盈潮退即噴水如山髙當吸水時人立其側衣一沾水人即隨水吸入窖中如不沾水雖近立亦無害至迤北一帶海島極多至冬夜長數月行路工作皆以燈産貂類極多人以為衣又有人長大多力遍體生毛如猱猴産牛羊鹿甚多犬最猛烈一犬可殺一虎遇獅亦不避也冬月海冰為風所擊嘗湧積如山人善漁獵山多鳥獸水多魚鱉人以魚肉為糧或磨魚為麵油為燈骨造舟車屋室亦可為薪其魚皮以為舟遇風不沉不破如陸走則負皮舟而行其海風甚猛能拔樹折屋及攝人物於他處又聞北海濵有小人國髙不二尺鬚眉絶無男女無辨跨鹿而行鸛鳥常欲食之小人恆與鸛相戰或預破其卵以絶種類又有小島其人性嗜酒任飲不醉年夀最長近諳厄利亞國為格落蘭得其地多火以磚石障之仍可居處或宛轉作溝以通火火熖所至便置釡甑熟物更不須薪其火亦終古不滅職方外紀卷二
