front:
  text: 欽定四庫全書史部十一
  hash: sha256:5f8ab01fbfc809cc911a707e5aa22577e1ed198056f701795ddffcd84b7bc12f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2k0146_WYG_000-1a, image: WYG0594/WYG0594-0279a.png}
body:
  text: 職方外紀地理類十外紀之屬提要臣等謹案職方外紀五卷明西洋人艾儒略撰其書成於天啓癸亥因西洋利氏齎進萬國圖志龎氏奉命翻譯儒略更增補以成之蓋因利瑪竇龎我迪舊本潤色之不盡儒略自作也所紀皆絶域風土為自古輿圖所不載故曰職方外紀其説分天下為五大州一曰亞細亞州其地西起那多理亞離福島六十二度東至亞尼俺峽離福島一百八十度南起瓜哇在赤道南十二度北至氷海在赤道北七十二度二曰歐邏巴州其地南起地中海北極出地三十五度北至氷海北極出地八十餘度經一萬一千二百五十里西起西海福島初度東至阿北河距福島九十二度經二萬三千里三曰利未亞州西南皆至利未亞海東至西紅海北至地中海極南南極出地三十五度極北北極出地三十五度東西廣七十八度四曰亞墨利加地分南北中通一峽峽南之地南起墨瓦蠟泥海峽南極出地五十二度北至加納達北極出地十度半西起二百八十六度東至三百五十五度峽北之地南起加納達南極出地十度半北至氷海其北極出地度數則未之測量西起一百八十度東盡福島三百六十度五曰墨瓦蠟泥加則彼國與之初通疆域道里尚莫得詳焉前冠以萬國全圖後附以四海總説所述多奇異不可究詰似不免多所夸飾然天地之大何所不有録而存之亦足以廣異聞焉乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀職方外紀自序造物主之生我人類於世也如進之大庭中令饗豐宴又娛歌舞之樂也嘗試仰觀天象而有日月五星列宿之麗則天似室廬列象似瑰寶之飾垣璧者然俯察地形而有山川草木之羅列芬芳則猶劇戲之當場者然其他空中飛鳥江海潛鱗地上百穀果實則集五齊八珍之薦列几筵者然然則造物主之恩厚亦極矣胡為乎人每日用不知若將謂同然宜然而曽莫究其所以然也昔神皇盛際聖化翔洽無逺弗賔吾友利氏齎進萬國圖志已而吾友龎氏又奉翻譯西刻地圖之命據所聞見譯為圖説以獻都人士多樂道之者但未經刻本以傳逮至今上御極而民物重新駸駸乎王會萬方之盛矣儒略不敏幸厠觀光慨慕前庥誠不忍其久而湮滅也偶從蠧簡得覩所遺舊藁乃更竊取西來所攜手輯方域梗概為增補以成一編名曰職方外紀私竊自哂殆不過如匠氏竹頭木屑之陳庖人蘋蘩薀藻之獻優伶雜劇百戲之搬演無當大觀非關實學惟用以供有識卧遊之萬一則亦或者小有補云且夫士抱雅志將以周遊四逺或為采風問俗以宏教化或為搜珍覓寶以充美觀或窮此疆爾界以察地形或訪聖賢名流以資師友或通有無貿遷以求贏羡或考羣方萬國山川形勝以證經傳子史之載紀或探竒覽秀以富襟懷以開神智諸如此類即有志焉而勢不無道里跋涉之勞瘁舟車資費之經營以至冦賊風波意外之警又往往足為我虞矧人夀之幾何勢非假羽翮以翔遊或莫能遍歷八荒以畢吾一生壯遊之願也兹賴後先同志出遊寰宇合聞合見以成此書不出户庭可以周知遐逺在創聞者固未免或駭為竒然而非竒實常或疑為虛然而非虛皆實夫惟造物主之神化無量是故五方萬國之竒詭不窮倘一轉念思厥所繇返本還原徑固不逺區區之愚良有見於此耳而淇園楊公雅相孚賞又為訂其蕪拙梓以行焉要亦契余不忘昔者吾友芹曝自獻之夙志而代終有成所願共戴天履地者既幸宅是庭饗是宴觀是樂因而遡流窮源循末求本言念創設萬有一大主宰而喟然昭事之是惕則巵言薈稡庶其不貽説鈴之誚乎若曰異聞異見姑以炫耀耳目則儒略何人而敢於學海名區呈此伎倆是又與於玩物喪志之甚者也欽定四庫全書職方外紀卷首明艾儒略撰五大州總圖界度解天體一大圜也地則圜中一點定居中心永不移動蓋惟中心離天最逺之處乃為最下之處萬重所趨而地體至重就下故不得不定居於中心稍有所移反與天體一邊相近不得為最下處矣古賢有言試使掘地可通以一物縋下至地中心必止其足底相對之方亦以一物縋下至地中心亦必止可見天圓地方乃語其動靜之德非以形論也地既圓形則無處非中所謂東西南北之分不過就人所居立名初無定準地度上與天度相應天有南北二極為運動樞兩極相距之中界為赤道平分天之南北其黃道斜與赤道相交南北俱出二十三度半日躔黃道一日約行一度自西而東奈為宗動天所帶是以自東而西一日一周天耳日輪正交赤道際為春秋二分規南出赤道二十三度半為冬至規北出赤道二十三度半為夏至規黃道之樞與赤道之樞亦相離二十三度半其周天之度經緯各三百六十地既在天之中央其度悉與天同如赤道之下與南北二極之下各二十三度半也又二極二至規外四十三度也分為五帶其赤道之下二至規以內此一帶者日輪常行頂上故為熱帶夏至規之北至北極規冬至規之南至南極規此兩帶者因日輪不甚逺近故為溫帶北極規與南極規之內此兩帶者因日輪止照半年故為冷帶赤道之下終嵗晝夜均平自赤道以北夏至晝漸長有十二時之晝有一月之晝有三月之晝直至北極之下則以半年為一晝矣往南亦然以南北距度考之其熱不得不然也其在東西同帶之地凡南北極出入相等者晝夜寒暑節氣俱同但其時則有先後或差一百八十度則此地為子彼地為午或差九十度則此地為子彼處為卯餘可類推也人居赤道之下者平望南北二極離南往北每二百五十里則北極出地一度南極入地一度行二萬二千五百里則見北極正當人頂出地九十度而南極入地九十度正對人足矣從南亦然此南北經度也至于東西緯度則天體轉環無定不可據七政量之隨方可作初度而天文家又立一法算之以宗動天一周則日月行三百六十度故每時得三十度如兩處相差一時則東西便離三十度也在兩處觀月食各自不同則知差一時者其地方相離三十度以此推之東西之度可考驗矣或但以里數考之古來地理家俱從西洋最西處為初度即以過福島子午規為始倣天度自西而東千度一規以分東西之度故畫圖必先畫東西南北之規後考本地離赤道之南北福島之東西幾何度數乃置本地方位譬如中國京師先知離赤道以北四十度離福島以東一百四十三度即于兩經緯線相交處得京師本位也但地形既圓則畫圖于極圓木毬方能肖像如畫于平面則不免或直剖之為一圖或橫截之為兩圖故全圖設為二種一長如卯形南北極居上下赤道居中一圓如盤形南北極為心赤道為界又于二全圖外另各設為一圖曰亞細亞曰歐邏巴曰利未亞曰亞墨利加也而墨瓦蠟厄加則國土未詳圖不另立云圖中南北規規相等皆以二百五十里為一度赤道之度亦然其離赤道平行東西諸規則漸近兩極者其規漸小然亦分為三百六十度其里數以次漸狹别有算法今畫圖為方者其畫線不免于稍變畢竟惟圓形之圖乃得其真也欽定四庫全書職方外紀明艾儒略撰圖職方外紀卷首
