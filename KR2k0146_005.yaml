body:
  text: 職方外紀卷五明艾儒略撰四海總說造物主之化成天地也四行包裹以漸而堅凝故火最居上而火包氣氣包水土則居於下焉是環地面皆水也然𤣥黃始判本為生人水土未分從何立命造物主於是别地為髙深而水盡行於地中與平土各得什五所瀦曰川曰湖曰海川則流湖則聚海則潮川與湖不過水之支𣲖而海則衆流所鍾稱百谷王焉故說水必詳於海有二焉海在國之中國包乎海者曰地中海國在海之中海包乎國者曰寰海川與湖占度無多不具論寰海極廣隨處異名或以州域稱則近亞細亞者謂亞細亞海近歐邏巴者謂歐邏巴海他如利未亞如亞墨利加如墨瓦蠟尼加及其他蕞爾小國皆可隨本地所稱又或隨其本地方隅命之則在南者謂南海在北者謂北海東西亦然隨方易向都無定準也兹將中國列中央則從大東洋至小東洋為東海從小西洋至大西洋為西海近墨瓦蠟尼一帶為南海近北極下為北海而地中海附焉天下之水盡於此禆海大瀛屬近荒唐無可證據海名海雖分而為四然中各異名如大明海太平海東紅海孛露海新以西把尼亞海百西兒海皆東海也如榜葛蠟海百爾西海亞刺比海西紅海利未亞海何摺亞諾滄海亞大蠟海以西把尼亞海皆西海也而南海則人跡罕至不聞異名北海則冰海新增蠟海伯爾昨客海皆是至地中海之外有波的海窩窩所德海入爾馬泥海太海北髙海皆在地中可附地中海海島海島之大者附載各國之後其小者不下千萬難以殫述大率在亞細亞者蘇門答蠟日本浡泥最大在歐邏巴者諳厄利亞最大在利未亞者聖老楞佐島最大在亞墨利加者小以西把尼亞最大在墨瓦蠟尼加者新為匿亞最大而太平海中則有七千四百四十島此外有石礁或見水面或隱水中水中者船極畏之又有沙渚船值之則陷此時盡棄舶中重貨雖百萬金錢所不恤乘潮至方得脫之否則斷無出理海族海中族類不可勝窮自鱗介而外凡陸地之走獸如虎狼犬豕之屬海中多有相似者今聊據舶行所見述一二以新聽聞魚之族一名把勒亞身長數十丈首有二大孔噴水上出勢若懸河每遇海舶則昻首注水舶中頃刻水滿舶沉遇之者亟以盛酒巨木罌投之連吞數罌則俯首而逝淺處得之熬油可數千斤一魚名斯得白長二十五丈其性最良善能保護人或漁人為惡魚所困此魚輒往鬬解漁人之困焉故彼國法禁人捕之一名薄里波其色能隨物而變如附土則如土色附石則如石色一名仁魚西書記此魚嘗負一小兒登岸偶以鬐觸傷兒兒死魚不勝悲痛亦觸石死西國取海豚嘗藉仁魚為招每呼仁魚入網即入海豚亦與之俱俟豚入盡復呼仁魚出網而海豚悉羅矣一名劒魚其嘴長丈許有齬刻如鋸猛而多力能與把勒亞魚戰海水皆紅此魚輒勝以嘴觸船則破海船甚畏之一魚甚大長十餘丈濶丈餘目大二尺頭髙八尺其口在腹下有三十二齒齒皆徑尺頥骨亦長五六尺迅風起嘗衝至海涯一魚甚大且有力海舶嘗遇之其魚竟以頭尾抱船兩頭舟人欲擊之恐一動則舟必覆惟跪祈天主須臾解去一如鱷魚名曰刺瓦而多長尾堅鱗甲刀箭不能入足有利爪鋸牙滿口性甚獰惡入水食魚登陸人畜無所擇百魚逺近皆避第其行甚遲小魚百種常隨之以避他魚之吞啖也其生子初如鵝卵後漸長以至二丈每吐涎於地人畜踐之即撲因就食之凡物開口皆動下頦此魚獨動上齶口中亦無舌冬月則不食物人見之却走必逐而食之人返逐之彼亦却走其目入水則鈍出水極明見人逺則哭之近則噬之故西國稱假慈悲者為刺瓦而多哭獨有三物能制之一為仁魚蓋此魚通身鱗甲惟腹下有軟處仁魚鬐甚利能刺殺之一為乙茍滿鼠屬也其大如猫善以泥塗身令滑俟此魚開口輒入腹嚙其五臟而出又能破壞其卵一為雜腹蘭香草也此魚最喜食蜜養蜂家四周種雜腹蘭即弗敢入有名落斯馬長四丈許足短居海底罕出水面皮甚堅用力刺之不可入額有二角如鈎寐時則以角掛石盡一日不醒有海魚海獸大如海島者嘗有西舶就一海島纜舟登岸行游半晌又復在岸造作火食漸次登舟解維不幾里忽聞海中起大聲回視向所登之島已沒方知是一魚背也有獸形體稍方其骨軟脆有翼能鼓大風以覆海舟其形亦大如島又有一獸二手二足氣力猛甚遇海舶輒顛倒播弄之多遭沒溺西舶稱為海魔惡之甚也其小者有飛魚僅尺許能掠水面而飛又有白角兒魚善窺飛魚之影伺其所向先至其所開口待啖恆相追數十里飛魚急輒上人舟為人得之舟人以雞羽或白練飄揚水面上著利鈎白角兒認為飛魚躍起吞之便為舟人所獲又有介屬之魚僅尺許有殼而六足足有皮如欲他徙則竪半殼當舟張足皮當帆乘風而行名曰航魚有蟹大踰丈許其螯以箝人首人首立斷箝人肱人肱立斷以其殼覆地如矮屋然可容人臥又有海馬其牙堅白而瑩淨文理細如絲髮可為念珠等物復有海女上體直是女人下體則為魚形亦以其骨為念珠等物可止下血二者皆魚骨中上品各國甚貴重之海鳥有二種其一宿島中者日常飛揚海面海舶遇之則可占海島逺近其一本生長於海中不知登岸舶上欲取之則以皮布水面以鈎著餌置皮上鳥就食之輒可鈎至若釣魚然又有鳥能捕魚者身生皮囊如網入水裹魚而出人因取之又有極異者為海人有二種其一通體皆人鬚眉畢具特手指略相連如鳬爪西海曾捕得之進於國王與之言不應與之飲食不嘗王以為不可狎復縱之海轉盻視人鼓掌大笑而去二百年前西洋喝蘭達地曾於海中獲一女人與之食輒食亦肯為人役使且活多年見十字聖架亦能起敬俯伏但不能言其一身有肉皮下垂至地如衣袍服者然但著體而生不可脫卸也二者俱可登岸數日不死但不識其性情莫測其族類又不知其在海宅於何所似人非人良可怪海産海産以明珠為貴則意蘭最上土人取海中蚌置日中晒之俟其口自開然後取珠則珠色鮮白光瑩有大如雞子者光照數里南海皆剖蚌出珠故珠色黯黯無光有珊瑚島其下多出珊瑚初在海中色緑而質柔軟上生白子土人以鐵網取之出水便堅有紅黑白三色紅色者堅而密白黑色者鬆脆不堪用大浪山之東北有暗礁水涸礁出悉是珊瑚之屬猫晴寶石各處不乏小西洋更多琥珀則歐邏巴波羅尼亞有之沿海三千里皆是蓋為風浪所湧堆積此地土人取為器物龍涎香黑人國與伯西兒兩海最多曾有大塊重千餘斤者望之如島然每為風濤湧泊於岸諸蟲魚獸並喜食之他狀前已具論海水本皆鹽味然亦有不假煎熬自凝為鹽塊者近忽魯謨斯處有山五色相間亦純是鹽土人鑿山石鏇以為器貯食物則不須和鹽蓋其器已是鹽自生鹹味也又有海樹太平海內淺處生草一望如林葱菁可愛海狀地心最為重濁水附於地到處就其重心故地形圓而水勢亦圓隔數百里水面便如橋梁逺望者不可見須登桅望之乃見其前或夷或險而海中夷險各處不同惟太平海極淺亘古至今無大風浪大西洋極深深十餘里從大西洋至大明海四十五度以南其風常有定候至四十五度以北風色便錯亂不常其尤異者在大明東南一隅常有異風變亂凌雜倏忽更二十四向海舶惟任風而飄風水又各異道如前為南風水必北行倐轉為北風而水勢尚未趨南舟莫適從因至摧破至小西洋海潮極髙大又極迅急平地頃刻湧數百里海中大舶及蛟龍魚鱉之屬常乘潮勢湧入山中不可出歐邏巴新曾蠟利未亞大浪山亦時起風浪甚險急至滿刺加海無風倐起波浪又不全海皆然惟里許一處以次第興後浪將起前浪已息矣海上雖多有風獨利未亞海近為匿亞之地當赤道下者常苦無風又天氣酷熱舶如至此食物俱壞人易生疾海深不得下碇舶大不能用櫓海水暗流及潮湧飄舶至淺處壞者多在於此海水味鹹中有火性又勢常激蕩故不成冰至北海則半年無日氣候極寒而冰故曰冰海海舶為冰堅所阻直須守至冰解方得去又苦冰山海中冰塊為風所擊堆叠成山海舶觸之定為虀粉矣赤道之下則終嵗常熱食物水酒至此色味皆變過之即復如常凡海中之色大率都緑惟東西二紅海其色淡紅或云海底珊瑚所映而然亦非本色也又近小西洋一處入夜則海水通明如火西儒常親見而異之持器汲起滿器俱火光又滴入掌中光亦瑩然可玩後來漸次消滅海舶海舶百種不止約有三等其小者僅容數十人専用以傳書信不以載物其舟腹空虛可容自上達下僅留一孔四圍㸃水不漏下鎮一石使舟底常就下一遇風濤不習水者盡入舟腹中密閉其孔復塗以瀝青使水不進其操舟者則捆縛其身於檣桅任水飄蕩因其腹中空虛永不沉溺船底又有鎮石亦不翻覆俟浪平舟人自解縛運舟萬無一失一日可行千里中者可容數百人自小西洋以達廣東則用此舶其大者上下八層最下一層鎮以沙石千餘石使舶不傾側震蕩全藉此沙石二三層載貨與食用之物海中最艱得水須裝淡水千餘大桶以足千人一年之用他物稱是其上近地平板一層則舶內中下人居之或裝細軟切用等物地平板之外則虛其中百步以為揚帆習武游戲作劇之地前後各建屋四層以為尊貴者之居中有甬道可通頭尾尾復建水閣為納涼之處以待貴者之遊息舶兩傍列大銃數十門以備不虞其鐵彈有三十餘斤重者上下前後有風帆十餘道桅之大者長十四丈帆濶八丈水手二三百人將卒鋭士三四百人客商數百有舶總管一人是西國貴官國王所命以掌一舶之事有賞罰生殺之權又有舶師三人歷師二人舶師専掌候風使帆整理器用吹掌號頭指使夫役探試淺水礁石以定趨避歷師専掌窺測天文晝則測日夜則測星用海圖量取度數以識險易以知道里又有官醫主一舶之疾病亦有市肆貿易食物大舶不畏風浪獨畏山礁淺沙又畏火舶上火禁極嚴蓋千人之命攸繫然其起程但候風色未嘗選擇時日亦未嘗有大失也海道儒略輩從歐邏巴各國起程逺近不一水陸各異大都一年之內皆聚於邊海波爾杜瓦爾國里西波亞都城候西商官舶春發入大洋從福島之北過夏至線在赤道北二十三度半踰赤道而南此處北極已沒南極漸髙又過冬至線在赤道南二十三度半越大浪山見南極髙三十餘度又逆轉冬至線過黑人國老楞佐島夾界中又踰赤道至小西洋南印度卧亞城在赤道北十六度風有順逆大率亦一年之內可抵小西洋至此則海中多島道險窄難行矣乃換中舶亦乘春月而行抵則意蘭經榜葛刺海從蘇門答蠟與滿刺加之中又經新加步峽迤北過占城暹邏界閲三年方抵中國嶺南廣州府此從西達中國之路也若從東而來自以西把尼亞地中海過巴爾德峽往亞墨利加之界有二道或從墨瓦蠟尼加峽出太平海或從新以西把尼亞界泊舟從陸路出孛露海過馬路古吕宋等島至大明海以達廣州然某輩皆從西而來不由東道西來之路經九萬里也行海晝夜無停有山島可記者則指山島而行至大洋中常萬里無山島則用羅經以審方其審方之法全在海圖量取度數即知海舶行至某處離某處若干里瞭如指掌百不失一職方外紀卷五
