body:
  text: 職方外紀卷三明艾儒略撰利未亞總說天下第三大州曰利未亞大小共百餘國西南至利未亞海東至西紅海北至地中海極南南極出地三十五度極北北極出地三十五度東西廣七十八度其地中多曠野野獸極盛有極堅好文彩之木能入水土千年不朽迤北近海諸國最豐饒五榖一嵗再熟每種一斗可收十石榖熟時外國百鳥皆至其地避寒就食涉冬始歸故秋末冬初近海諸地獵取禽鳥無算所産葡萄樹極髙大生實繁衍他國所無地既曠野人或無常居每種一熟即移徙他處野地皆産異獸因其處水泉絶少水之所瀦百獸聚焉更復異類相合輒産奇形怪狀之獸地多獅為百獸之王凡禽獸見之皆匿影性最傲遇之者若亟俯伏雖餓時亦不噬也千人逐之亦徐行人不見處反任性疾行惟畏雄雞車輪之聲聞之則逺遁又最有情受人德必報之常時病瘧四日則發一度其病時躁暴猛烈人不能制擲之以毬則騰跳轉弄不息其近水成羣處頗為行旅之害昔國王嘗命一官驅之其官計無所施惟擒捉幾隻斷其頭足肢體遍掛林中後稍驚竄有鳥名亞既刺乃百鳥之王也羽毛黃黑色髙二三尺首有冠鈎喙如鷹隼飛極髙巢於峻山石穴內生子則令視日目不瞬者乃留之夀最長久老者脫去羽毛復生新羽與雛不異性鷙猛能攫羊鹿百鳥食之肉經宿則不食矣有冒險者尋得其巢取其餘肉可供終嵗有毒蛇能害其子則知先尋一種石置巢邊蛇毒遂解其性有知覺受人德亦必報焉西國大王恆用此鳥像為號有山狸似麝臍後有肉囊香滿其中輒病向石上剔出之始安香如蘇合油而黑其貴次於龍涎能療耳病又産一異羊甚巨一尾便得數十斤其味最美有毒蛇能殺人上人有能制蛇者蛇至其前自能驅逐又非有方術禁制此等人世世子孫皆然有尊貴人行路必覓此人自隨又有如狼狀者名大布獸其身人其手足専穴人墓食人尸又有一獸軀極大狀極異其長五丈許口吐涎即龍涎香或云龍涎是土中所産初流出如脂至海漸凝為塊大有千餘斤者海魚或食之又在魚腹中剖出非此獸所吐也其地馬最善走又猛能與虎鬬虎豹熊羆之類種種不一土人多以田獵為事貴人亦時出獵搏獅虎以為娛界內名山有亞大蠟者在西北天下惟此山最髙凡風雨露雷皆在山半山頂終古晴明視日星倍大昔人有畫字於灰上者歷千年不動無風故也國人呼為天柱此方人夜睡無夢甚為奇有月山在赤道南二十三度極險峻不可躋攀有獅山在西南境其上頻興雷電轟擊不絶不間寒暑其在曷噩刺國者出銀礦甚多取之不可盡其在西南海者曰大浪山其下海風迅急浪起極大商舶至此或不能過則退歸西洋船破敗率在此處過之則大喜可望登岸矣故亦稱喜望峰此山而東嘗有暗礁全是珊瑚之屬剛者利若鋒刃海船極畏避之凡利未亞之國著者曰厄入多曰馬邏可曰弗沙曰亞費利加曰奴米弟亞曰亞昆心域曰馬拿莫大巴曰西爾得散處者曰井巴島曰聖多默島意勒訥島聖老楞佐島厄入多利未亞之東北有大國曰厄入多自古有名極稱富厚中古時曾大豐七載繼即大歉七載當時天主教中有前知聖人名籥瑟者預教國人廣儲蓄令罄國中之財悉用積榖至荒時出之不惟救本國之饑而四方財貨因來糴榖盡輸入其國中故富厚無比至今五榖極饒畜産最多凡他方百果草木移至此地即茂盛倍常其地千萬年無雨亦無雲氣國中有一大河名曰泥祿河河水每年一發自五月始以漸而長土人視水漲多少以為豐歉之候大率最大不過二丈一尺最小不過一丈五尺至一丈五尺則歉收二丈一尺則大有年矣凡水漲無過四十日其水中有膏腴水所極處膏腴即著土中又不泥濘故地極肥饒百榖草木俱暢茂當水盛時城郭多被淹沒國人於水未發前預杜門户移家於舟以避之去河逺處水亦不至昔有國王専求救旱潦之法得一智巧士曰亞爾幾默得者為作一水器以時注泄便利無比即今龍尾車也國人極有機智好攻格物窮理之學又精天文因其地不雨併無雲霧日月星辰晝夜明朗夜卧又不須入屋內舉目即見天象故其考驗益精他國不如也其國未奉真教時好為淫祀即禽獸草木之利賴於人者如牛司耕馬司負雞司晨以至蔬品中為葱為薤之類皆欽若鬼神祀之或不敢食其誕妄若此至天主耶穌降生少時嘗至其地方入境諸魔像皆傾頽繼有二三聖徒到彼化誨遂出有名聖賢甚多其國女人恆一乳生三四子天下騾不孳生惟此地騾能傳種昔國王嘗鑿數石臺如浮屠狀非以石砌是擇大石如陵阜者鏟削成之大者下趾濶三百二十四步髙二百七十五級級髙四尺登臺頂極力逺射箭不能越其臺趾也有城古名曰孟斐斯今曰該祿是古昔大國之都城名聞西土其城有百門門髙百尺街衢行三日始遍城用本處一種脂膏砌石成之堅緻無比五百年前此國最為強盛善用象戰鄰國大小皆畏服之象戰時以桑椹色視象則怒而奔敵所向披靡都城富厚屬國甚多今其國已廢城亦為大水衝擊齧其下土因而傾倒然此城雖不如舊尚有街長三十里悉為市肆行旅喧填百貨具集城中常有駱駝二三萬馬邏可弗沙亞非利加奴米弟亞厄入多近地中海一帶為馬邏可與弗沙國馬邏可地分七道出獸皮羊皮極珍美蜜最多國人以蜜為糧其俗以冠為重非貴人老人不得加冠於首僅以尺布蔽頂而已弗沙地分七道都城之大為利未亞之最宫室殿宇極其華整髙大有一殿周圍三里開三十門夜則燃燈九百盞國人亦略識理義入多之西為亞非利加地最肥饒易生一麥嘗秀三百四十一穗以此極為富厚西土稱為天下之倉馬邏之南有國名奴米弟亞人性獰惡不可教誨有果樹如棗可食其地有小利未亞乏水泉方千里無江河行旅過者須備兼旬之水亞毗心域馬拿莫大巴者利未亞東北近紅海處其國甚多人皆黑色迤北稍有白色向南漸黑甚者色如漆矣惟齒目極白其人有兩種一在利未亞之東者名亞毗心域地方極大據本州三分之一從西紅海至月山皆其封域産五榖五金金不善鍊恆以生金塊易物糖蠟極多造燭純以蠟不知用油國中道不拾遺夜不閉户從來不知有寇盜其人極智慧又能崇奉天主修道者手持十字或懸掛胸前極知敬愛西土篤默聖人為其傳道自彼始也王行遊國中常有六千皮帳隨之僕從車徒恆滿五六十里一種在利未亞之南名馬拿莫大把者國土最多皆極愚蠢不識理義其地氣候甚熱沿海處皆沙人踐之即成瘡痏黑人坐卧其中安然無恙也所居極穢如豕牢喜食象肉亦食人市中有市人肉處皆生齕之故齒皆銼鋭若犬牙然奔走疾於馳馬不衣衣反笑人衣衣者或塗油於身以為美樂絶無文字初歐邏巴人到此黑人見其看誦經書講說道理大相驚訝以為書中有言語可傳達也其愚如此地無兵刃惟以木為標鎗火炙其鋭處用之極銛利身有羶氣永不可除性不知憂慮若鳥獸然聞簫管琴瑟諸樂音便起舞不能止但其性朴實耐久教之為善事即盡力為之為人奴極忠於主為主用力視死如歸遇敵直前了無避忌其俗大略不崇魔像亦知天地有主但視其王若神靈亦以為天地之主凡陰晴旱潦皆往祈之王若偶一噴涕舉朝皆髙聲應諾又舉國皆髙聲應諾大可笑也人性喜飲酒易醉所産雞亦皆黑獨豕肉為天下第一美味病者食之亦無害産象極大一牙有重二百斤者又有獸如猫名亞爾加里亞尾後有汗極香黑人穽於木籠中汗沾於木乾之以刀削下便為奇香烏木黃金最多地無寸鐵特貴重之布帛喜紅色班色及玻璃器又善浮水他國名為海鬼其亞毗心域屬國有名諳哥得者夜食不晝食又止一餐絶不再食以鹽鐵為幣又一種名步冬頗知學問重書籍善歌舞亦亞毗心域之類也西爾得工鄂利未亞之西有海濵國名西爾得其地有兩大沙其一在海中隨水游移不定其一在地隨風飄泊所至積如邱山城郭田畝皆被壓沒國人甚苦之又有工鄂國地亦豐饒頗解義理自與西客往來國中大都崇奉真教其王又遣子往歐邏巴習學文字講明格物窮理之學焉井巴利未亞之南有一種夷人名曰井巴聚衆十餘萬極勇猛又善用兵無定居以馬及駱駝乘載遷徙所至即食其人及鳥獸蟲蛇必生命盡絶乃轉他國為南方諸小國之大害福島利未亞西北有七島福島其總名也其地甚饒凡生人所需無所不有絶無雨而風氣滋潤易長草木百榖亦不煩耕種布種自生葡萄酒及白糖至多西土商舶往來必到此島市物以為舟中之用七島中有一鐵島絶無泉水而生一種大樹每日沒即有雲氣抱之釀成甘水滴下至明旦日出方雲散水歇樹下作數池一夜輒滿人畜皆沾足焉終古如此名曰聖迹水言天主不絶人用特造此奇異之迹以養人各國人多盛歸以為異物聖多默島意勒納島聖老楞佐島聖多默島在利未亞之西赤道之下圍千里徑三百里其地濃陰多雨愈近日處雲愈重雨愈多凡在此島之果俱無核又有意勒納島鳥獸果實甚繁而絶無人居海舶從小西洋至大西洋者恆泊此十餘日樵採漁獵備二三萬里之用而去又赤道南有聖老楞佐島圍二萬餘里從十七度至二十六度半人多黑色散處林麓無定居出琥珀象牙極廣職方外紀卷三
